---
- name: Install nginx apt prerequisites
  ansible.builtin.apt:
    name:
      - curl
      - gnupg2
      - ca-certificates
      - lsb-release
      - ubuntu-keyring
    state: present
    update_cache: true

- name: Download nginx signing key
  ansible.builtin.get_url:
    url: https://nginx.org/keys/nginx_signing.key
    dest: /tmp/nginx_signing.key
    mode: "0644"

- name: Remove old dearmored nginx signing key
  ansible.builtin.file:
    path: /usr/share/keyrings/nginx-archive-keyring.gpg
    state: absent

- name: Dearmor nginx signing key
  ansible.builtin.command:
    cmd: gpg --dearmor --output /usr/share/keyrings/nginx-archive-keyring.gpg /tmp/nginx_signing.key
  changed_when: true

- name: Verify nginx signing key fingerprint
  ansible.builtin.command:
    cmd: gpg --dry-run --quiet --no-keyring --import --import-options import-show /usr/share/keyrings/nginx-archive-keyring.gpg
  register: configure_nginx_gpg_check
  changed_when: false

- name: Assert nginx signing key fingerprint
  ansible.builtin.assert:
    that:
      - "'573BFD6B3D8FBC641079A6ABABF5BD827BD9BF62' in configure_nginx_gpg_check.stdout"
    fail_msg: nginx signing key fingerprint mismatch

- name: Configure nginx mainline apt repository
  ansible.builtin.apt_repository:
    repo: >-
      deb [signed-by=/usr/share/keyrings/nginx-archive-keyring.gpg]
      https://nginx.org/packages/mainline/ubuntu {{ ansible_distribution_release }} nginx
    filename: nginx
    state: present

- name: Pin nginx.org packages
  ansible.builtin.copy:
    dest: /etc/apt/preferences.d/99nginx
    owner: root
    group: root
    mode: "0644"
    content: |
      Package: *
      Pin: origin nginx.org
      Pin: release o=nginx
      Pin-Priority: 900

- name: Install latest nginx mainline package
  ansible.builtin.apt:
    name: nginx
    state: present
    update_cache: true
