---
- name: Validate supported nginx distro
  ansible.builtin.assert:
    that:
      - >-
        ansible_distribution in ['RedHat', 'Rocky', 'AlmaLinux', 'OracleLinux', 'CentOS', 'Debian', 'Ubuntu']
    fail_msg: >-
      configure_nginx supports RedHat/Rocky/AlmaLinux/OracleLinux/CentOS, Debian, and Ubuntu hosts for nginx.org mainline packages.

- name: Include RedHat tasks
  ansible.builtin.include_tasks: 01-redhat.yml
  when: ansible_distribution in ['RedHat', 'Rocky', 'AlmaLinux', 'OracleLinux', 'CentOS']

- name: Include Debian tasks
  ansible.builtin.include_tasks: 01-debian.yml
  when: ansible_distribution == 'Debian'

- name: Include Ubuntu tasks
  ansible.builtin.include_tasks: 01-ubuntu.yml
  when: ansible_distribution == 'Ubuntu'

- name: Copy nginx.conf
  ansible.builtin.copy:
    src: nginx.conf
    dest: /etc/nginx/nginx.conf
    owner: root
    group: root
    mode: "0644"

- name: Create directories for sites available and enabled
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  loop:
    - /etc/nginx/sites-available
    - /etc/nginx/sites-enabled

- name: Nginx enabled and running
  ansible.builtin.systemd_service:
    name: nginx
    enabled: true
  notify: Restart nginx

- name: Copy logrotate config
  ansible.builtin.copy:
    src: logrotate-nginx-vhost
    dest: /etc/logrotate.d/nginx-vhost
    owner: root
    group: root
    mode: "0644"
