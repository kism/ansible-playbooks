#     dest: /etc/samba/smb.conf
#     mode: "0744"
#   notify:
#     - Restart smbd

- name: Copy avahi config
  ansible.builtin.copy:
    src: files/avahi_smb.xml
    dest: /etc/avahi/services/smb.service
    mode: "0744"
  notify:
    - Restart avahi
