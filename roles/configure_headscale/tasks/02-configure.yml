---
- name: Create headscale system user
  ansible.builtin.user:
    name: headscale
    home: /var/lib/headscale
    create_home: true
    system: true
    group: headscale
    shell: /usr/sbin/nologin

- name: Copy systemd service file for headscale
  ansible.builtin.template:
    src: headscale.service.j2
    dest: /etc/systemd/system/headscale.service
    owner: root
    group: root
    mode: "0644"
  notify: Reload systemd

- name: Enable and start headscale service
  ansible.builtin.systemd_service:
    name: headscale
    enabled: true
    state: started
