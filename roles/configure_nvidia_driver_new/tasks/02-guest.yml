---
# Guest installation - compute-only, no kernel modules (host provides them)

- name: Install NVIDIA driver for guest (open kernel modules)
  ansible.builtin.package:
    name:
      - nvidia-driver-cuda
    state: present
  when: configure_nvidia_driver_new_kernel_modules == "open"

- name: Install NVIDIA driver for guest (proprietary kernel modules)
  ansible.builtin.package:
    name:
      - nvidia-driver-cuda
    state: present
  when: configure_nvidia_driver_new_kernel_modules == "proprietary"
