---
# Set up NVIDIA network repository for Debian
# https://docs.nvidia.com/drivers/

- name: Install kernel headers
  ansible.builtin.package:
    name: "linux-headers-{{ ansible_facts['kernel'] }}"
    state: present

- name: Set distro string for NVIDIA repo
  ansible.builtin.set_fact:
    configure_nvidia_driver_new_distro: "{{ ansible_facts['distribution'] | lower }}{{ ansible_facts['distribution_major_version'] }}"

- name: Download cuda-keyring package
  ansible.builtin.get_url:
    url: "https://developer.download.nvidia.com/compute/cuda/repos/{{ configure_nvidia_driver_new_distro }}/x86_64/cuda-keyring_1.1-1_all.deb"
    dest: /tmp/cuda-keyring.deb
    mode: "0644"
  when: ansible_architecture == "x86_64"

- name: Download cuda-keyring package (arm64)
  ansible.builtin.get_url:
    url: "https://developer.download.nvidia.com/compute/cuda/repos/{{ configure_nvidia_driver_new_distro }}/sbsa/cuda-keyring_1.1-1_all.deb"
    dest: /tmp/cuda-keyring.deb
    mode: "0644"
  when: ansible_architecture == "aarch64"

- name: Install cuda-keyring package
  ansible.builtin.apt:
    deb: /tmp/cuda-keyring.deb
    state: present

- name: Update apt cache
  ansible.builtin.apt:
    update_cache: true

- name: Install driver version pinning
  ansible.builtin.package:
    name: "nvidia-driver-pinning-{{ configure_nvidia_driver_new_version }}"
    state: present
