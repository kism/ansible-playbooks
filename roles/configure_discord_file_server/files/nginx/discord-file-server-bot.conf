server {
    listen 80;
    server_name df.kg.lan;

    # Redirect HTTP → HTTPS in production
    # return 301 https://$host$request_uri;

    # Proxy all requests to the FastAPI app
    location / {
        proxy_pass         http://127.0.0.1:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Internal location used by X-Accel-Redirect.
    # FastAPI never sends clients here directly; only nginx sees it.
    # The alias path must match the FILES_ROOT setting.
    location /internal/ {
        internal;
        alias /mnt/merge/;   # <-- set this to your FILES_ROOT
    }
}
