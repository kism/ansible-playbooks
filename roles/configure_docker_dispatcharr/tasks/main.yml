---
- name: Create dir for docker compose
  ansible.builtin.file:
    path: /opt/dispatcharr
    state: directory
    owner: root
    group: root

- name: Copy docker compose file
  ansible.builtin.copy:
    src: files/docker-compose.yml
    dest: /opt/dispatcharr/docker-compose.yml
    owner: root
    group: root
    mode: "0644"

- name: Allow dispatcharr through firewall
  ansible.builtin.firewalld:
    service: dispatcharr
    permanent: true
    state: enabled
    immediate: true
