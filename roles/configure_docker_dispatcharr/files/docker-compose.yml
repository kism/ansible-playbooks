services:
  dispatcharr:
    # build:
    #   context: .
    #   dockerfile: Dockerfile
    image: ghcr.io/dispatcharr/dispatcharr:latest
    restart: unless-stopped
    container_name: dispatcharr
    ports:
      - 9191:9191
    volumes:
      - dispatcharr_data:/data
    environment:
      - DISPATCHARR_ENV=aio
      - REDIS_HOST=localhost
      - CELERY_BROKER_URL=redis://localhost:6379/0
      - DISPATCHARR_LOG_LEVEL=info
      # Legacy CPU Support (Optional)
      # Uncomment to enable legacy NumPy build for older CPUs (circa 2009)
      # that lack support for newer baseline CPU features
      #- USE_LEGACY_NUMPY=true
      # Process Priority Configuration (Optional)
      # Lower values = higher priority. Range: -20 (highest) to 19 (lowest)
      # Negative values require cap_add: SYS_NICE (uncomment below)
      #- UWSGI_NICE_LEVEL=-5   # uWSGI/FFmpeg/Streaming (default: 0, recommended: -5 for high priority)
      #- CELERY_NICE_LEVEL=5   # Celery/EPG/Background tasks (default: 5, low priority)
    #
    # Uncomment to enable high priority for streaming (required if UWSGI_NICE_LEVEL < 0)
    #cap_add:
    #  - SYS_NICE
    # Optional for hardware acceleration
    #devices:
    #  - /dev/dri:/dev/dri  # For Intel/AMD GPU acceleration (VA-API)
    # Uncomment the following lines for NVIDIA GPU support
    # NVidia GPU support (requires NVIDIA Container Toolkit)
    #deploy:
    #  resources:
    #      reservations:
    #          devices:
    #              - driver: nvidia
    #                count: all
    #                capabilities: [gpu]

  nodecast-tv:
    build: https://github.com/technomancer702/nodecast-tv.git#main
    container_name: nodecast-tv
    ports:
      - "3000:3000" # Host:Container
    volumes:
      - nodecast_data:/app/data
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3000 # Optional: Internal container port

  acestream-http-proxy:
    image: ghcr.io/martinbjeldbak/acestream-http-proxy:3.1
    container_name: acestream-http-proxy
    ports:
      - "127.0.0.1:6878:6878" # WebUI / API
      - "8621:8621" # P2P, let this through your firewall if you don't have UPNP
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "curl",
          "--fail",
          "--silent",
          "--show-error",
          "http://127.0.0.1:6878/webui/api/service?method=get_version",
        ]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 60s

  acerestreamer:
    # image: acerestreamer:latest # docker buildx build --network=host --file docker/Dockerfile.combined . -t acerestreamer
    image: ghcr.io/kism/acerestreamer:latest # From GitHub Container Registry
    container_name: acerestreamer

    environment:
      ACERE_EXTERNAL_URL: "http://stream.kg.lan:5100" # Change to your domain
      ACERE_FIRST_SUPERUSER_USERNAME: "admin"
      ACERE_FIRST_SUPERUSER_PASSWORD: "" # This will only set the password on first run, if empty a random password will be generated and printed in the logs
      ACERE_AUTH_DISABLED: "true"
      ACERE_APP__ACE_ADDRESS: "http://acestream-http-proxy:6878" # Leave this as is
    ports:
      - "5100:5100"
    volumes: # This is where the database and config is stored
      - acerestreamer_instance:/app/instance
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "curl",
          "--fail",
          "--silent",
          "--show-error",
          "http://127.0.0.1:5100/api/v1/health",
        ]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  dispatcharr_data:
  acerestreamer_instance:
  nodecast_data:
