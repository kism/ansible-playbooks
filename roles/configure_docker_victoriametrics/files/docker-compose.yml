---
services:
  victoriametrics:
    image: victoriametrics/victoria-metrics:latest
    container_name: victoriametrics
    # ports:
    #   - 8428:8428 # Web console (no auth), we don't expose this since docker will punch this through iptables
    volumes:
      - /var/lib/victoriametrics:/victoria-metrics-data
    restart: always
  vmauth:
    image: victoriametrics/vmauth:latest
    container_name: vmauth
    ports:
      - 8427:8427 # Web console
    volumes:
      - /opt/victoriametrics/auth.yml:/etc/auth.yml
    command:
      - -auth.config=/etc/auth.yml
    restart: always
