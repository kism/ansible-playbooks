server {
    server_name kierangee.au;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }

    location /private {
        include /etc/nginx/ipallowlist.conf;
    }

    error_page 404 /404.html;
    location = /404.html {
            internal;
    }

    error_page 403 /403.html;
    location = /403.html {
            internal;
    }

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/kierangee.au/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/kierangee.au/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    access_log /var/log/nginx/vhosts/kierangee.access;
    error_log /var/log/nginx/vhosts/kierangee.error error;
}

server {
    if ($host = kierangee.au) {
        return 301 https://$host$request_uri;
    }
    server_name kierangee.au;
    listen 80;
    return 404;
}
