server {
    server_name df.kierangee.au;
    location / {
        proxy_pass http://df.kg.lan/;
    }
    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/kierangee.au/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/kierangee.au/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    access_log /var/log/nginx/vhosts/df.access;
    error_log /var/log/nginx/vhosts/df.error error;
}

server {
    if ($host = df.kierangee.au) {
        return 301 https://$host$request_uri;
    }
    server_name df.kierangee.au;
    listen 80;
    return 404;
}
