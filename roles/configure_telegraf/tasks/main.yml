---
- name: Include tasks for {{ ansible_facts['distribution'] | lower + "" + ansible_facts['distribution_major_version'] }}
  ansible.builtin.include_tasks: "01-{{ ansible_facts['distribution'] | lower }}-{{ ansible_facts['distribution_major_version'] }}.yml"

- name: Install telegraf
  ansible.builtin.package:
    name: telegraf
    state: present
  when: ansible_facts['distribution'] != "Archlinux"

- name: Include tasks, telegraf configs
  ansible.builtin.include_tasks: "{{ config_playbook }}"
  with_fileglob:
    - "tasks/telegraf_config/*"
  loop_control:
    loop_var: config_playbook

- name: Enable telegraf service
  ansible.builtin.service:
    name: telegraf
    enabled: true
    state: started
